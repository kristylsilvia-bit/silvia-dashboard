<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silvia Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #0d0f14; color: #e8eaf0; min-height: 100vh; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .topbar-left { display: flex; align-items: baseline; gap: 12px; }
  .home-name { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; color: #f0f2f8; }
  .clock { font-family: 'DM Mono', monospace; font-size: 14px; color: #6b7280; }
  .weather-pill { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 7px 16px; font-size: 13px; color: #9ca3af; }
  .weather-temp { font-size: 17px; font-weight: 500; color: #f0f2f8; font-family: 'DM Mono', monospace; }
  .content { padding: 22px 24px; display: flex; flex-direction: column; gap: 24px; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 20px 16px; text-align: center; }
  .stat-val { font-size: 32px; font-weight: 600; font-family: 'DM Mono', monospace; color: #f0f2f8; line-height: 1; }
  .stat-val.amber { color: #fab73c; }
  .stat-val.green { color: #4ade80; }
  .stat-label { font-size: 11px; color: #4b5563; margin-top: 8px; letter-spacing: 0.4px; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 1.4px; text-transform: uppercase; color: #4b5563; margin-bottom: 12px; }
  .rooms-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .room-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 18px 16px; transition: all 0.15s; position: relative; }
  .room-card.active { background: rgba(250,183,60,0.1); border-color: rgba(250,183,60,0.3); }
  .room-dot { width: 7px; height: 7px; border-radius: 50%; background: #fab73c; position: absolute; top: 13px; right: 13px; box-shadow: 0 0 0 3px rgba(250,183,60,0.15); }
  .room-icon { font-size: 24px; margin-bottom: 12px; display: block; }
  .room-name { font-size: 14px; font-weight: 500; color: #d1d5db; }
  .room-count { font-size: 11px; color: #6b7280; margin-top: 3px; }
  .devices-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .device-tile { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 18px 16px; cursor: pointer; transition: background 0.1s, border-color 0.1s; display: flex; flex-direction: column; gap: 14px; user-select: none; }
  .device-tile:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.12); }
  .device-tile.on { background: rgba(250,183,60,0.08); border-color: rgba(250,183,60,0.25); }
  .device-top { display: flex; align-items: center; justify-content: space-between; }
  .device-icon-wrap { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: 19px; transition: all 0.1s; }
  .device-tile.on .device-icon-wrap { background: rgba(250,183,60,0.15); }
  .toggle { width: 38px; height: 22px; border-radius: 11px; background: #1f2937; border: 1px solid rgba(255,255,255,0.08); position: relative; transition: background 0.15s; flex-shrink: 0; }
  .toggle.on { background: #fab73c; border-color: #fab73c; }
  .toggle-knob { width: 16px; height: 16px; border-radius: 50%; background: #374151; position: absolute; top: 2px; left: 3px; transition: transform 0.15s, background 0.15s; }
  .toggle.on .toggle-knob { transform: translateX(16px); background: #fff; }
  .device-name { font-size: 13px; font-weight: 500; color: #d1d5db; line-height: 1.3; }
  .device-area { font-size: 11px; color: #4b5563; margin-top: 2px; }
  .media-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 18px; display: flex; align-items: center; gap: 16px; }
  .media-icon { width: 50px; height: 50px; border-radius: 12px; background: rgba(139,92,246,0.12); display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
  .media-info { flex: 1; }
  .media-name { font-size: 15px; font-weight: 500; color: #f0f2f8; }
  .media-sub { font-size: 12px; color: #6b7280; margin-top: 3px; }
  .media-song { font-size: 12px; color: #9ca3af; margin-top: 2px; }
  .media-badge { font-size: 11px; font-weight: 500; background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.2); border-radius: 7px; padding: 4px 10px; white-space: nowrap; }
  .media-badge.playing { background: rgba(250,183,60,0.15); color: #fab73c; border-color: rgba(250,183,60,0.2); }
  .sun-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .sun-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 16px 18px; display: flex; align-items: center; gap: 12px; }
  .sun-label { font-size: 11px; color: #6b7280; }
  .sun-time { font-size: 18px; font-weight: 500; font-family: 'DM Mono', monospace; color: #f0f2f8; margin-top: 2px; }
  .error-banner { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; padding: 10px 16px; font-size: 13px; color: #fca5a5; display: none; }

  /* Apple TV remote */
  .remote-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 18px; display: grid; grid-template-columns: 1fr; gap: 22px; }
  @media (min-width: 900px) { .remote-card { grid-template-columns: minmax(0,1fr) minmax(0,1fr); } }
  .remote-left { display: flex; flex-direction: column; gap: 14px; }
  .remote-right { display: flex; flex-direction: column; gap: 12px; }
  .np-strip { display: flex; align-items: center; gap: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; }
  .np-art { width: 48px; height: 48px; border-radius: 10px; background: rgba(139,92,246,0.12); display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
  .np-meta { flex: 1; min-width: 0; }
  .np-app { font-size: 14px; font-weight: 500; color: #f0f2f8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-title { font-size: 12px; color: #9ca3af; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-sub { font-size: 11px; color: #6b7280; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rstate { font-size: 11px; font-weight: 500; border-radius: 7px; padding: 4px 10px; white-space: nowrap; flex-shrink: 0; }
  .rstate.playing { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
  .rstate.paused { background: rgba(250,183,60,0.15); color: #fab73c; border: 1px solid rgba(250,183,60,0.2); }
  .rstate.standby { background: rgba(255,255,255,0.06); color: #9ca3af; border: 1px solid rgba(255,255,255,0.1); }
  .rbtn { min-height: 48px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.09); border-radius: 12px; color: #e8eaf0; font-family: inherit; font-size: 15px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.08s, background 0.1s; user-select: none; }
  .rbtn:active { transform: scale(0.94); background: rgba(255,255,255,0.1); }
  .rbtn.primary { background: rgba(250,183,60,0.15); border-color: rgba(250,183,60,0.3); color: #fab73c; font-size: 18px; }
  .rbtn.active { background: rgba(250,183,60,0.15); border-color: rgba(250,183,60,0.3); color: #fab73c; }
  .rbtn-row { display: grid; gap: 8px; }
  .rbtn-row.top3 { grid-template-columns: repeat(3, 1fr); }
  .rbtn-row.playback { grid-template-columns: repeat(5, 1fr); }
  .rbtn-row.volume { grid-template-columns: repeat(4, 1fr); }
  .vol-display { display: flex; align-items: center; justify-content: center; min-height: 48px; font-family: 'DM Mono', monospace; font-size: 16px; color: #f0f2f8; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; }
  .dpad { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 260px; aspect-ratio: 1; margin: 2px auto; }
  .dbtn { min-height: 48px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.09); border-radius: 12px; color: #e8eaf0; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.08s, background 0.1s; user-select: none; }
  .dbtn:active { transform: scale(0.92); background: rgba(255,255,255,0.1); }
  .dbtn.up { grid-column: 2; grid-row: 1; }
  .dbtn.left { grid-column: 1; grid-row: 2; }
  .dbtn.ok { grid-column: 2; grid-row: 2; border-radius: 50%; background: rgba(250,183,60,0.12); border-color: rgba(250,183,60,0.25); color: #fab73c; font-weight: 600; font-size: 15px; }
  .dbtn.right { grid-column: 3; grid-row: 2; }
  .dbtn.down { grid-column: 2; grid-row: 3; }
  .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .app-tile { min-height: 48px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 12px 4px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; color: #d1d5db; font-family: inherit; cursor: pointer; transition: transform 0.08s, background 0.1s; user-select: none; }
  .app-tile:active { transform: scale(0.94); background: rgba(255,255,255,0.08); }
  .app-tile.active { background: rgba(250,183,60,0.12); border-color: rgba(250,183,60,0.3); color: #fab73c; }
  .app-emoji { font-size: 22px; line-height: 1; }
  .app-name { font-size: 11px; font-weight: 500; text-align: center; line-height: 1.2; }
  .source-row { display: flex; align-items: center; gap: 10px; }
  .source-label { font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: #6b7280; }
  .source-select { flex: 1; min-height: 48px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.09); border-radius: 12px; color: #e8eaf0; font-family: inherit; font-size: 14px; padding: 0 12px; cursor: pointer; }
  .source-select option { background: #1a1d24; color: #e8eaf0; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <span class="home-name">Silvia Home</span>
    <span class="clock" id="clock">—</span>
  </div>
  <div class="weather-pill">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>
    <span>Valatie, NY</span>
    <span class="weather-temp" id="weather-temp">—</span>
  </div>
</div>
<div class="content">
  <div class="error-banner" id="error-banner"></div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val amber" id="stat-on">—</div><div class="stat-label">devices on</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-total">—</div><div class="stat-label">total devices</div></div>
    <div class="stat-card"><div class="stat-val green">OK</div><div class="stat-label">system status</div></div>
  </div>
  <div><div class="section-label">Rooms</div><div class="rooms-grid" id="rooms-grid"></div></div>
  <div><div class="section-label">Devices</div><div class="devices-grid" id="devices-grid"></div></div>
  <div><div class="section-label">Media</div><div id="media-section"></div></div>
  <div><div class="section-label">Apple TV Remote</div><div id="remote-wrap"></div></div>
  <div>
    <div class="section-label">Sun</div>
    <div class="sun-row">
      <div class="sun-item"><span style="font-size:22px">🌅</span><div><div class="sun-label">Sunrise</div><div class="sun-time" id="sunrise-time">—</div></div></div>
      <div class="sun-item"><span style="font-size:22px">🌇</span><div><div class="sun-label">Sunset</div><div class="sun-time" id="sunset-time">—</div></div></div>
    </div>
  </div>
</div>

<script>
const HA = window.location.hostname === '192.168.0.186' ? 'http://192.168.0.186:8123' : 'http://104.229.7.78:8123';
const TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI0MjM5NDJiZDIxY2Y0MmFmODc2NGMyZDQ0YmQzNTQzMCIsImlhdCI6MTc4MDUxMzQ0NCwiZXhwIjoyMDk1ODczNDQ0fQ.4F324qxpAkGENzLnt2Qi_E4r2qmVOfcLO_QJeviiEk0';
const HEADERS = { Authorization: 'Bearer ' + TOKEN, 'Content-Type': 'application/json' };

const ATV = 'media_player.james_apple_tv';
const ATV_REMOTE = 'remote.james_apple_tv';
const APPS = [
  ['Apple TV+','📺'], ['Netflix','🎬'], ['YouTube','▶️'], ['Disney+','✨'],
  ['Hulu','🟢'], ['Spotify','🎵'], ['Music','🎶'], ['Max','🎭'],
  ['Prime Video','🎥'], ['Arcade','🎮'], ['Podcasts','🎙️'], ['Photos','🖼️']
];

// diagnostic suffixes to exclude
const DIAGNOSTIC_PATTERNS = [
  /auto.?off/i, /auto.?update/i, /\bled\b/i, /overload/i,
  /overheat/i, /signal/i, /cloud/i, /reboot/i, /rssi/i,
  /firmware/i, /power.?protect/i, /turn.?off.?in/i,
  /consumption/i, /current/i, /voltage/i, /today/i, /month/i,
  /hidden/i, /diagnostic/i
];

function isDiagnostic(s) {
  // HA marks these with entity_category
  if (s.attributes.entity_category) return true;
  const name = s.attributes.friendly_name || '';
  return DIAGNOSTIC_PATTERNS.some(p => p.test(name));
}

const ICON_MAP = [
  [/fan/i, '💨'],
  [/light|lamp/i, '💡'],
  [/bath/i, '🛁'],
  [/tv|television|apple tv/i, '📺'],
  [/plug|outlet|socket/i, '🔌'],
];
function getIcon(name) {
  for (const [re, icon] of ICON_MAP) if (re.test(name)) return icon;
  return '🔌';
}

const AREA_ICON_MAP = {
  'living room': '🛋️', 'kitchen': '🍳', 'bedroom': '🛏️',
  'master bedroom': '🛏️', 'hallway bathroom': '🛁', 'hallway': '🚶',
  "james'": '🎮', 'james': '🎮', 'family room': '🛋️',
  'office': '💻', 'garage': '🚗', 'backyard': '🌿',
};
function getAreaIcon(area) {
  return AREA_ICON_MAP[area.toLowerCase()] || '🏠';
}

function inferArea(s) {
  const n = (s.attributes.friendly_name || '').toLowerCase();
  const id = s.entity_id.toLowerCase();
  const t = n + ' ' + id;
  if (/hallway.bath|bath.*hall|unnamed_s515/.test(t)) return 'Hallway Bathroom';
  if (/hallway/.test(t)) return 'Hallway';
  if (/master.bed|momm|madre|padre|smart.plug/.test(t)) return 'Master Bedroom';
  if (/james|unnamed_kp/.test(t)) return "James'";
  if (/family.room/.test(t)) return 'Family Room';
  if (/kitchen/.test(t)) return 'Kitchen';
  if (/living/.test(t)) return 'Living Room';
  if (/bedroom/.test(t)) return 'Bedroom';
  return 'Other';
}

let allStates = {};
let devices = [];
let mediaPlayers = [];

async function fetchStates() {
  try {
    const r = await fetch(HA + '/api/states', { headers: HEADERS });
    if (!r.ok) throw new Error(r.status);
    const all = await r.json();

    allStates = {};
    devices = [];
    mediaPlayers = [];

    all.forEach(s => {
      allStates[s.entity_id] = s;
      const domain = s.entity_id.split('.')[0];

      if ((domain === 'switch' || domain === 'light') &&
          !['unavailable', 'unknown'].includes(s.state) &&
          !isDiagnostic(s)) {
        devices.push(s);
      }

      if (domain === 'media_player' &&
          !['unavailable', 'unknown'].includes(s.state)) {
        mediaPlayers.push(s);
      }

      if (s.entity_id === 'weather.forecast_home') updateWeather(s);
      if (s.entity_id === 'sun.sun') updateSun(s);
    });

    renderAll();
    document.getElementById('error-banner').style.display = 'none';
  } catch(e) {
    document.getElementById('error-banner').style.display = 'block';
    document.getElementById('error-banner').textContent = 'Cannot reach Home Assistant';
  }
}

function toggle(entityId, domain) {
  if (allStates[entityId]) allStates[entityId].state = allStates[entityId].state === 'on' ? 'off' : 'on';
  renderAll();
  fetch(`${HA}/api/services/${domain}/toggle`, {
    method: 'POST', headers: HEADERS,
    body: JSON.stringify({ entity_id: entityId })
  }).catch(() => fetchStates());
}

// --- Apple TV remote ---
function esc(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function appEmoji(app) {
  const a = (app || '').toLowerCase();
  if (/music|spotify/.test(a)) return '🎵';
  if (/netflix/.test(a)) return '🎬';
  if (/youtube/.test(a)) return '▶️';
  if (/disney/.test(a)) return '✨';
  return '📺';
}

function appMatches(tileName, currentApp) {
  if (!currentApp) return false;
  const c = currentApp.toLowerCase();
  const t = tileName.toLowerCase();
  const key = t.replace(/\+/g, '').replace(/video/g, '').trim();
  return c === t || c.includes(key) || key.includes(c);
}

function haCall(domain, service, data) {
  fetch(`${HA}/api/services/${domain}/${service}`, {
    method: 'POST', headers: HEADERS, body: JSON.stringify(data)
  }).catch(() => fetchStates());
}
function atvRemote(command) { haCall('remote', 'send_command', { entity_id: ATV_REMOTE, command }); }
function atvMedia(service, extra) { haCall('media_player', service, Object.assign({ entity_id: ATV }, extra || {})); }
function atvSource(source) { atvMedia('select_source', { source }); }

function atvPlayPause() {
  const s = allStates[ATV];
  if (s) s.state = s.state === 'playing' ? 'paused' : 'playing';
  renderRemote();
  atvMedia('media_play_pause');
}

function atvVolume(dir) {
  const s = allStates[ATV];
  if (s && typeof s.attributes.volume_level === 'number') {
    const v = s.attributes.volume_level + (dir === 'up' ? 0.06 : -0.06);
    s.attributes.volume_level = Math.max(0, Math.min(1, v));
  }
  renderRemote();
  atvMedia(dir === 'up' ? 'volume_up' : 'volume_down');
}

function atvMute() {
  const s = allStates[ATV];
  const muted = s ? !s.attributes.is_volume_muted : true;
  if (s) s.attributes.is_volume_muted = muted;
  renderRemote();
  atvMedia('volume_mute', { is_volume_muted: muted });
}

function renderRemote() {
  const s = allStates[ATV];
  const state = s ? s.state : 'unavailable';
  const app = s && s.attributes.app_name ? s.attributes.app_name : '';
  const title = s && s.attributes.media_title ? s.attributes.media_title : '';
  const sub = s ? (s.attributes.media_artist || s.attributes.media_series_title || '') : '';
  const muted = !!(s && s.attributes.is_volume_muted);
  const volPct = s && typeof s.attributes.volume_level === 'number' ? Math.round(s.attributes.volume_level * 100) : 0;
  const playing = state === 'playing';

  let badge = 'Standby', bclass = 'rstate standby';
  if (playing) { badge = 'Playing'; bclass = 'rstate playing'; }
  else if (state === 'paused') { badge = 'Paused'; bclass = 'rstate paused'; }
  else if (state === 'unavailable' || state === 'unknown') { badge = 'Off'; }

  const sources = s && Array.isArray(s.attributes.source_list) ? s.attributes.source_list : [];
  const curSource = s && s.attributes.source ? s.attributes.source : '';

  const appGrid = APPS.map(([name, emoji]) => {
    const active = appMatches(name, app);
    return `<button class="app-tile ${active ? 'active' : ''}" onclick="atvSource('${name}')">
        <span class="app-emoji">${emoji}</span><span class="app-name">${name}</span>
      </button>`;
  }).join('');

  const sourceDropdown = sources.length ? `
      <div class="source-row">
        <span class="source-label">Source</span>
        <select class="source-select" onchange="atvSource(this.value)">
          ${sources.map(src => `<option value="${esc(src)}" ${src === curSource ? 'selected' : ''}>${esc(src)}</option>`).join('')}
        </select>
      </div>` : '';

  document.getElementById('remote-wrap').innerHTML = `
    <div class="remote-card">
      <div class="remote-left">
        <div class="np-strip">
          <div class="np-art">${appEmoji(app)}</div>
          <div class="np-meta">
            <div class="np-app">${esc(app) || 'Apple TV'}</div>
            <div class="np-title">${title ? esc(title) : (playing || state === 'paused' ? '' : 'Nothing playing')}</div>
            ${sub ? `<div class="np-sub">${esc(sub)}</div>` : ''}
          </div>
          <span class="${bclass}">${badge}</span>
        </div>

        <div class="rbtn-row top3">
          <button class="rbtn" onclick="atvRemote('menu')">Menu</button>
          <button class="rbtn" onclick="atvRemote('home')">Home</button>
          <button class="rbtn" onclick="atvRemote('screensaver')">Sleep</button>
        </div>

        <div class="dpad">
          <button class="dbtn up" onclick="atvRemote('up')">▲</button>
          <button class="dbtn left" onclick="atvRemote('left')">◀</button>
          <button class="dbtn ok" onclick="atvRemote('select')">OK</button>
          <button class="dbtn right" onclick="atvRemote('right')">▶</button>
          <button class="dbtn down" onclick="atvRemote('down')">▼</button>
        </div>

        <div class="rbtn-row playback">
          <button class="rbtn" onclick="atvMedia('media_previous_track')">⏮</button>
          <button class="rbtn" onclick="atvRemote('skip_backward')">⏪10</button>
          <button class="rbtn primary" onclick="atvPlayPause()">${playing ? '⏸' : '▶'}</button>
          <button class="rbtn" onclick="atvRemote('skip_forward')">10⏩</button>
          <button class="rbtn" onclick="atvMedia('media_next_track')">⏭</button>
        </div>

        <div class="rbtn-row volume">
          <button class="rbtn ${muted ? 'active' : ''}" onclick="atvMute()">${muted ? '🔇' : '🔊'}</button>
          <button class="rbtn" onclick="atvVolume('down')">－</button>
          <div class="vol-display">${volPct}%</div>
          <button class="rbtn" onclick="atvVolume('up')">＋</button>
        </div>
        ${sourceDropdown}
      </div>

      <div class="remote-right">
        <div class="section-label">Apps</div>
        <div class="app-grid">${appGrid}</div>
      </div>
    </div>`;
}

function renderAll() {
  const onCount = devices.filter(d => d.state === 'on').length;
  document.getElementById('stat-on').textContent = onCount;
  document.getElementById('stat-total').textContent = devices.length;

  // build area groups
  const areaMap = {};
  devices.forEach(d => {
    const area = inferArea(d);
    if (!areaMap[area]) areaMap[area] = [];
    areaMap[area].push(d);
  });

  // rooms
  document.getElementById('rooms-grid').innerHTML = Object.entries(areaMap).map(([area, devs]) => {
    const active = devs.filter(d => d.state === 'on').length;
    return `<div class="room-card ${active ? 'active' : ''}">
      ${active ? '<div class="room-dot"></div>' : ''}
      <span class="room-icon">${getAreaIcon(area)}</span>
      <div class="room-name">${area}</div>
      <div class="room-count">${active} active</div>
    </div>`;
  }).join('');

  // devices
  document.getElementById('devices-grid').innerHTML = devices.map(d => {
    const on = d.state === 'on';
    const name = d.attributes.friendly_name || d.entity_id;
    const domain = d.entity_id.split('.')[0];
    const area = inferArea(d);
    return `<div class="device-tile ${on ? 'on' : ''}" onclick="toggle('${d.entity_id}','${domain}')">
      <div class="device-top">
        <div class="device-icon-wrap">${getIcon(name)}</div>
        <div class="toggle ${on ? 'on' : ''}"><div class="toggle-knob"></div></div>
      </div>
      <div><div class="device-name">${name}</div><div class="device-area">${area}</div></div>
    </div>`;
  }).join('');

  // media
  document.getElementById('media-section').innerHTML = mediaPlayers.map(s => {
    const name = s.attributes.friendly_name || s.entity_id;
    let badge = 'Standby', badgeClass = 'media-badge', song = '';
    if (s.state === 'playing') {
      badge = 'Playing'; badgeClass = 'media-badge playing';
      const t = s.attributes.media_title || '', a = s.attributes.media_artist || '';
      song = a ? `${t} — ${a}` : t;
    } else if (s.state === 'paused') {
      badge = 'Paused'; badgeClass = 'media-badge playing';
      song = s.attributes.media_title || '';
    }
    return `<div class="media-card">
      <div class="media-icon">📺</div>
      <div class="media-info">
        <div class="media-name">${name}</div>
        <div class="media-sub">Apple TV 4K · James' room</div>
        ${song ? `<div class="media-song">${song}</div>` : ''}
      </div>
      <span class="${badgeClass}">${badge}</span>
    </div>`;
  }).join('');

  renderRemote();
}

function updateWeather(s) {
  document.getElementById('weather-temp').textContent =
    Math.round(s.attributes.temperature) + (s.attributes.temperature_unit || '°F');
}

function updateSun(s) {
  document.getElementById('sunrise-time').textContent = fmtTime(new Date(s.attributes.next_rising));
  document.getElementById('sunset-time').textContent = fmtTime(new Date(s.attributes.next_setting));
}

function fmtTime(d) {
  let h = d.getHours(), m = d.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')} ${ap}`;
}

function updateClock() {
  const n = new Date();
  let h = n.getHours(), m = n.getMinutes(), s = n.getSeconds();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent =
    `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ap}`;
}

fetchStates();
setInterval(fetchStates, 5000);
setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
